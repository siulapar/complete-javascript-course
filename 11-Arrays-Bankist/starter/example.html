<!doctype html>
<html>
  <head>
    <style>
      .grid-container {
        display: grid;
        /* Creates 3 equal columns and rows of 100px */
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(3, 100px);
        gap: 10px;
        background-color: #2c3e50;
        padding: 10px;
        font-family: sans-serif;
      }

      .item {
        background-color: #3498db;
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        border: 2px solid white;
      }

      /* The Header: Starts at col line 1, ends at 4 (full width) */
      .header {
        grid-column: 1 / 4;
        background-color: #e74c3c;
      }

      /* The Sidebar: Starts at row line 2, ends at 4 (tall) */
      .sidebar {
        grid-row: 2 / 4;
        grid-column: 1;
        background-color: #27ae60;
      }

      /* The Main Content: Starts at col 2, spans 2 columns */
      .content {
        grid-column: 2 / span 2;
        grid-row: 2;
        background-color: #f1c40f;
        color: #333;
      }

      /* The Footer: Stays in the bottom right cell */
      .footer {
        grid-column: 2 / 3;
        grid-row: 3;
        background-color: #9b59b6;
      }

      /* MY test */
      .jeff {
        grid-column: 3 / 4;
        grid-row: 3;
        background-color: #3455af;
      }
    </style>
  </head>
  <body>
    <div class="grid-container">
      <div class="item header">Header (1 / 4)</div>
      <div class="item sidebar">Sidebar (Row 2 / 4)</div>
      <div class="item content">Content (Col 2 / Span 2)</div>
      <div class="item footer">Footer (Col 2 / 4)</div>
      <div class="item jeff">Jeff Test</div>
    </div>
  </body>
</html>
